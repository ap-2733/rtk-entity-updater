name: Publish to npm

on:
  release:
    types: [created]        # Triggers when you create a GitHub Release
  # OR trigger on push to main:
  # push:
  #   branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'  # Important!

      - run: npm ci
      - run: npm run build
      - run: npm publish --access public

        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}  # npm token from secret